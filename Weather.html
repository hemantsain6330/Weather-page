<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <script></script>
    <script></script>
</head>
<body class="bg-gray-100 font-sans p-6">
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="bg-white p-6 rounded-2xl shadow-md">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">💰 Expense Tracker</h2>
            
            <form id="expense-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Expense Name</label>
                    <input type="text" id="expense-name" required placeholder="e.g., Dinner, Petrol" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Amount (₹)</label>
                    <input type="number" id="expense-amount" required placeholder="e.g., 500" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Category</label>
                    <select id="expense-category" class="w-full mt-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Food">🍔 Food</option>
                        <option value="Travel">🚗 Travel</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Bills">⚡ Bills</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-lg font-semibold hover:bg-blue-700 transition">Add Expense</button>
            </form>

            <h3 class="text-lg font-bold mt-6 mb-2 text-gray-700">Recent History</h3>
            <ul id="expense-list" class="divide-y divide-gray-200 max-h-48 overflow-y-auto">
                </ul>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-md flex flex-col justify-between">
            <div>
                <h2 class="text-xl font-bold mb-2 text-gray-800">Total Spending</h2>
                <p class="text-4xl font-extrabold text-blue-600">₹<span id="total-amount">0</span></p>
            </div>
            
            <div class="mt-6">
                <canvas id="expenseChart" width="200" height="200"></canvas>
            </div>
        </div>

    </div>

    <script>
        // Data Store
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let myChart;

        const form = document.getElementById('expense-form');
        const nameInput = document.getElementById('expense-name');
        const amountInput = document.getElementById('expense-amount');
        const categoryInput = document.getElementById('expense-category');
        const list = document.getElementById('expense-list');
        const totalDisplay = document.getElementById('total-amount');

        function updateUI() {
            list.innerHTML = '';
            let total = 0;
            let categoryTotals = { Food: 0, Travel: 0, Shopping: 0, Bills: 0 };

            expenses.forEach((exp, index) => {
                total += exp.amount;
                categoryTotals[exp.category] += exp.amount;

                const li = document.createElement('li');
                li.className = 'py-2 flex justify-between items-center text-sm text-gray-700';
                li.innerHTML = `
                    <span><strong>${exp.name}</strong> (${exp.category})</span>
                    <span class="font-semibold text-red-500">₹${exp.amount}</span>
                `;
                list.appendChild(li);
            });

            totalDisplay.innerText = total;
            updateChart(categoryTotals);
            localStorage.setItem('expenses', JSON.stringify(expenses));
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newExpense = {
                name: nameInput.value,
                amount: parseFloat(amountInput.value),
                category: categoryInput.value
            };
            expenses.push(newExpense);
            form.reset();
            updateUI();
        });

        function updateChart(data) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            
            if (myChart) {
                myChart.destroy();
            }

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{
                        data: Object.values(data),
                        backgroundColor: ['#f87171', '#60a5fa', '#fbbf24', '#34d399']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }

        // Initial Load
        updateUI();
    </script>
</body>
</html>
